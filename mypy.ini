[mypy]
python_version = 3.10
ignore_missing_imports = True
# Restore implicit Optional behaviour for existing code (PEP 484 strict mode
# would require rewriting dozens of function signatures not in scope here)
implicit_optional = True
# Don't require annotations on every function
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
warn_return_any = False
warn_unused_ignores = False

# Pre-existing type issues in files outside the scope of this hardening pass.
[mypy-pypitch.report.pdf]
ignore_errors = True

[mypy-pypitch.features]
ignore_errors = True

[mypy-pypitch.live.ingestor]
ignore_errors = True

[mypy-pypitch.live.overlay]
ignore_errors = True

[mypy-pypitch.core.video_sync]
ignore_errors = True

[mypy-pypitch.core.attribution]
ignore_errors = True

[mypy-pypitch.models.win_predictor]
ignore_errors = True

[mypy-pypitch.models.train]
ignore_errors = True

[mypy-pypitch.runtime.executor]
ignore_errors = True
