version: '3.8'

services:
  pypitch-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYPITCH_ENV=production
      - PYPITCH_SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - PYPITCH_API_KEY_REQUIRED=true
      - PYPITCH_API_KEYS=${PYPITCH_API_KEYS:?PYPITCH_API_KEYS is required}
      - PYPITCH_CORS_ORIGINS=${PYPITCH_CORS_ORIGINS:-}
      - PYPITCH_ALLOWED_HOSTS=${PYPITCH_ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - ./data:/app/data
    depends_on:
      - pypitch-db
    healthcheck:
      # Uses Python (always present in image) — curl is not installed
      test: ["CMD", "python", "-c",
             "import http.client, sys; c=http.client.HTTPConnection('localhost',8000,timeout=5); c.request('GET','/health'); r=c.getresponse(); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  pypitch-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=pypitch
      - POSTGRES_USER=pypitch
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init-db.sql removed — PyPitch uses DuckDB, not Postgres DDL init scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pypitch"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1 # Using latest v2.x LTS for compatibility; v3.x has breaking changes
    ports:
      - "127.0.0.1:9090:9090"  # localhost-only: not exposed to the public internet
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.1
    ports:
      - "127.0.0.1:3000:3000"  # localhost-only: not exposed to the public internet
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning and dashboard bind-mounts are added here once
      # monitoring/grafana/provisioning and monitoring/grafana/dashboards exist locally.
      # Uncomment when you create those directories:
      # - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      # - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: