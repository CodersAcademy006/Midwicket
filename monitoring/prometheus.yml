# Minimal Prometheus configuration for PyPitch
# Extend this file as your monitoring needs grow.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "pypitch-api"
    static_configs:
      - targets: ["pypitch-api:8000"]
    metrics_path: /metrics
    # If API key auth is enabled, set bearer_token to one key listed in PYPITCH_API_KEYS.
    # bearer_token: "replace-with-one-api-key"
