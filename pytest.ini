[pytest]
pythonpath = .
testpaths = tests
# Root-level test_*.py files are tombstone redirects only (see each file's header).
# They are excluded from collection here AND by testpaths = tests above.
norecursedirs = examples docs scripts __pycache__ .venv venv .git
addopts = -ra -q -m "not performance"
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    performance: marks tests as performance tests